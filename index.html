<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stellar — 星辰画廊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================
       CSS Variables — Stellar Design System
       ============================ */
    :root {
      --color-accent: #D4A853;
      --color-accent-glow: #F0D48A;
      --color-accent-soft: rgba(212, 168, 83, 0.15);
      --color-bg-deep: #08080C;
      --color-bg-surface: #111118;
      --color-bg-card: #181820;
      --color-bg-overlay: #0C0C14;
      --color-interactive: #D4A853;
      --color-interactive-hover: #E5C16A;
      --color-gray-100: #F0F0F5;
      --color-gray-200: #C8C8D0;
      --color-gray-300: #9898A6;
      --color-gray-400: #686878;
      --color-gray-500: #3C3C48;
      --color-gray-600: #252530;
      --color-gray-700: #181820;
      --color-border-default: #252530;
      --color-border-glow: #D4A853;
      --color-border-strong: #3C3C48;
      --color-success: #4ADE80;
      --color-warning: #FBBF24;
      --color-error: #EF4444;
      --shadow-card-hover: 0 4px 24px rgba(0,0,0,0.5), 0 0 30px rgba(212,168,83,0.15);
      --shadow-lightbox: 0 16px 60px rgba(0,0,0,0.7);
      --shadow-toolbar: 0 -4px 20px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 30px rgba(212,168,83,0.25);
      --font-display: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
      --font-body: 'Inter', 'SF Pro Text', system-ui, -apple-system, sans-serif;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;
      --space-section: 96px;
      --ease-stellar: cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg-deep);
      color: var(--color-gray-100);
      line-height: 1.55;
      overflow-x: hidden;
      cursor: default;
    }

    /* ============================
       Particle Canvas
       ============================ */
    #particle-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ============================
       Navigation
       ============================ */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(8, 8, 12, 0.75);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      height: 56px; padding: 0 var(--space-xl);
      display: flex; align-items: center; justify-content: space-between;
      transition: background 300ms var(--ease-stellar);
    }
    .nav-logo { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--color-accent); letter-spacing: -0.02em; }
    .nav-links { display: flex; gap: var(--space-lg); list-style: none; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--color-gray-200); text-decoration: none; transition: color 200ms ease; cursor: pointer; min-height: 44px; display: flex; align-items: center; }
    .nav-links a:hover, .nav-links a.active { color: var(--color-accent); }
    .nav-hamburger { display: none; width: 44px; height: 44px; background: transparent; border: none; cursor: pointer; color: var(--color-gray-200); font-size: 22px; align-items: center; justify-content: center; }

    /* ============================
       Gallery Section
       ============================ */
    .gallery-section { position: relative; z-index: 1; padding-top: calc(56px + var(--space-3xl)); padding-bottom: var(--space-section); background: var(--color-bg-surface); }
    .gallery-header { max-width: 1400px; margin: 0 auto; padding: 0 var(--space-xl); margin-bottom: var(--space-2xl); }
    .gallery-title { font-family: var(--font-display); font-size: clamp(36px, 3vw, 48px); font-weight: 600; line-height: 1.15; letter-spacing: -0.03em; color: var(--color-gray-100); margin-bottom: var(--space-sm); }
    .gallery-subtitle { font-size: 16px; font-weight: 400; line-height: 1.55; color: var(--color-gray-300); }
    .gallery-filters { display: flex; gap: var(--space-sm); margin-top: var(--space-lg); flex-wrap: wrap; }
    .filter-btn { font-family: var(--font-body); font-size: 13px; font-weight: 500; letter-spacing: 0.02em; background: rgba(212, 168, 83, 0.1); color: var(--color-accent); border: 1px solid rgba(212, 168, 83, 0.2); border-radius: 9999px; padding: 6px 16px; cursor: pointer; transition: all 200ms var(--ease-stellar); }
    .filter-btn:hover, .filter-btn.active { background: var(--color-accent); color: var(--color-bg-deep); border-color: var(--color-accent); }
    /* Masonry waterfall grid — CSS columns approach */
    .gallery-grid {
      max-width: 1400px; margin: 0 auto; padding: 0 var(--space-xl);
      column-count: 2; column-gap: var(--space-lg);
    }

    /* ============================
       Image Card — Masonry + 3D Tilt + Glow Border
       ============================ */
    .image-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border-default);
      border-radius: 12px;
      overflow: hidden;
      padding: 0;
      cursor: pointer;
      position: relative;
      /* masonry — avoid column break + column gap handled by container */
      break-inside: avoid;
      margin-bottom: var(--space-lg);
      display: inline-block;
      width: 100%;
      /* grayscale awakening — initial state */
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 800ms var(--ease-stellar) 100ms,
                  transform 800ms var(--ease-stellar) 100ms,
                  border-color 300ms var(--ease-stellar),
                  box-shadow 300ms var(--ease-stellar);
      /* 3D perspective for tilt */
      perspective: 1200px;
      perspective-origin: center center;
    }
    .image-card.awakened { opacity: 1; transform: translateY(0); }

    /* Glow border — radial gradient positioned via JS on mousemove */
    .image-card .glow-border {
      position: absolute; inset: -2px; border-radius: 14px;
      opacity: 0;
      background: radial-gradient(circle 200px at var(--mx, 50%) var(--my, 50%),
        rgba(212, 168, 83, 0.6),
        rgba(212, 168, 83, 0.15) 40%,
        transparent 70%
      );
      z-index: 0; pointer-events: none;
      transition: opacity 300ms var(--ease-stellar);
    }
    @media (hover: hover) {
      .image-card.awakened:hover .glow-border { opacity: 1; }
    }

    /* 3D tilt wrapper for image */
    .image-card-inner {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      transition: transform 150ms ease-out;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .image-card.awakened:hover {
      border-color: var(--color-border-glow);
      box-shadow: var(--shadow-card-hover);
    }
    @media (hover: hover) {
      .image-card.awakened:hover { transform: translateY(-4px); }
    }

    .image-card-img {
      width: 100%;
      display: block;
      object-fit: cover;
      filter: grayscale(100%);
      will-change: filter;
      transition: filter 1200ms var(--ease-stellar);
      position: relative; z-index: 1;
    }
    .image-card.awakened .image-card-img { filter: grayscale(0%); }

    /* Info overlay */
    .image-card-info {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
      background: linear-gradient(transparent, rgba(8, 8, 12, 0.92));
      padding: 40px var(--space-md) var(--space-md);
      pointer-events: none;
    }
    .image-card-title {
      font-family: var(--font-display);
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 600; line-height: 1.3; letter-spacing: -0.01em;
      color: var(--color-accent); margin-bottom: var(--space-xs);
    }
    .image-card-meta { font-size: 14px; font-weight: 400; line-height: 1.5; color: var(--color-gray-300); }

    /* Badges */
    .image-card-badge { position: absolute; top: var(--space-md); right: var(--space-md); z-index: 3; display: flex; gap: var(--space-sm); }
    .badge-category { background: rgba(212, 168, 83, 0.1); color: var(--color-accent); font-size: 11px; font-weight: 500; letter-spacing: 0.02em; border-radius: 9999px; padding: 4px 12px; border: 1px solid rgba(212, 168, 83, 0.2); }
    .badge-new { background: var(--color-accent); color: var(--color-bg-deep); font-size: 11px; font-weight: 700; letter-spacing: 0.02em; border-radius: 9999px; padding: 2px 10px; }

    /* Action buttons */
    .image-card-actions { position: absolute; top: var(--space-md); left: var(--space-md); z-index: 3; display: flex; gap: var(--space-sm); }
    @media (hover: hover) { .image-card-actions { opacity: 0; transition: opacity 200ms var(--ease-stellar); } .image-card:hover .image-card-actions { opacity: 1; } }
    .card-action-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(24, 24, 32, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: none; color: var(--color-gray-200); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 200ms ease;
      min-width: 44px; min-height: 44px;
    }
    .card-action-btn:hover { color: var(--color-accent); background: rgba(24, 24, 32, 0.95); }

    /* ============================
       Long Press Context Menu (Mobile)
       ============================ */
    .longpress-menu {
      position: fixed; z-index: 350;
      background: var(--color-bg-card);
      border: 1px solid var(--color-accent);
      border-radius: 16px;
      padding: var(--space-sm);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 30px rgba(212,168,83,0.2);
      display: none;
      flex-direction: column;
      gap: 2px;
      min-width: 160px;
      animation: menu-pop 200ms var(--ease-stellar);
      overflow: hidden;
    }
    .longpress-menu.show { display: flex; }
    @keyframes menu-pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .longpress-menu button {
      display: flex; align-items: center; gap: var(--space-md);
      padding: var(--space-md);
      border: none; background: transparent;
      color: var(--color-gray-100); font-size: 15px; font-weight: 500;
      cursor: pointer; border-radius: 10px;
      transition: all 150ms ease;
      font-family: var(--font-body);
      min-height: 48px;
    }
    .longpress-menu button:hover, .longpress-menu button:active { background: rgba(212,168,83,0.12); color: var(--color-accent); }
    .longpress-menu button svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ============================
       Lightbox (with Zoom + Drag)
       ============================ */
    .lightbox-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(12, 12, 20, 0.96);
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      display: flex; align-items: center; justify-content: center;
      animation: lightbox-in 300ms var(--ease-stellar);
      overflow: hidden;
    }
    .lightbox-overlay.hidden { display: none; }
    @keyframes lightbox-in { from { opacity: 0; } to { opacity: 1; } }

    .lightbox-img-container {
      position: relative;
      max-width: 90vw; max-height: 85vh;
      cursor: grab;
      user-select: none; -webkit-user-select: none;
    }
    .lightbox-img-container.dragging { cursor: grabbing; }
    .lightbox-img-container.zoomed { cursor: grab; }
    .lightbox-img-container.zoomed.dragging { cursor: grabbing; }

    .lightbox-img {
      display: block;
      max-width: 90vw; max-height: 80vh;
      object-fit: contain; border-radius: 4px;
      transition: opacity 200ms var(--ease-stellar);
      transform-origin: center center;
      transition: transform 200ms var(--ease-stellar), opacity 200ms var(--ease-stellar);
    }

    .lightbox-title { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-family: var(--font-display); font-size: 20px; font-weight: 500; line-height: 1.35; color: var(--color-gray-100); text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
    .lightbox-meta { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 14px; color: var(--color-gray-300); }

    .lightbox-close {
      position: absolute; top: var(--space-xl); right: var(--space-xl); z-index: 10;
      width: 48px; height: 48px; background: rgba(24, 24, 32, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: none; border-radius: 50%; color: var(--color-gray-200); font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 200ms ease;
    }
    .lightbox-close:hover { color: var(--color-accent); background: rgba(24, 24, 32, 0.95); }

    .lightbox-arrow {
      position: absolute; top: 50%; z-index: 10;
      width: 44px; height: 44px; background: rgba(24, 24, 32, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: none; border-radius: 50%; color: var(--color-gray-200); font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 200ms ease;
    }
    .lightbox-arrow:hover { color: var(--color-accent); background: rgba(24, 24, 32, 0.95); }
    .lightbox-arrow.left { left: var(--space-xl); transform: translateY(-50%); }
    .lightbox-arrow.right { right: var(--space-xl); transform: translateY(-50%); }

    .lightbox-toolbar {
      position: absolute; bottom: var(--space-xl); left: 50%;
      transform: translateX(-50%); z-index: 10;
      display: flex; gap: 12px;
    }

    .lightbox-zoom-hint {
      position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
      font-size: 13px; color: var(--color-gray-400);
      opacity: 0; transition: opacity 400ms ease;
      pointer-events: none; white-space: nowrap;
    }
    .lightbox-zoom-hint.show { opacity: 1; }

    .btn-ghost {
      background: transparent; color: var(--color-gray-100);
      border: 1px solid var(--color-border-strong);
      font-size: 14px; font-weight: 600; letter-spacing: 0.03em;
      border-radius: 9999px; padding: 8px 20px; height: 40px;
      cursor: pointer; transition: all 200ms ease;
      display: flex; align-items: center; gap: var(--space-xs);
      font-family: var(--font-body);
    }
    .btn-ghost:hover { border-color: var(--color-accent); color: var(--color-accent); }

    /* ============================
       Toast
       ============================ */
    .toast-container { position: fixed; bottom: var(--space-2xl); right: var(--space-xl); z-index: 300; display: flex; flex-direction: column; gap: var(--space-sm); }
    .toast { background: var(--color-bg-card); border: 1px solid var(--color-border-default); border-radius: 12px; padding: var(--space-md) var(--space-lg); color: var(--color-gray-100); font-size: 14px; font-weight: 500; backdrop-filter: blur(12px); animation: toast-in 300ms var(--ease-stellar); display: flex; align-items: center; gap: var(--space-sm); }
    .toast .toast-icon { color: var(--color-success); font-size: 16px; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* ============================
       Footer
       ============================ */
    .site-footer { position: relative; z-index: 1; background: var(--color-bg-deep); border-top: 1px solid var(--color-border-default); padding: var(--space-2xl) var(--space-xl); text-align: center; }
    .footer-logo { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--color-accent); letter-spacing: -0.02em; margin-bottom: var(--space-md); }
    .footer-text { font-size: 13px; font-weight: 400; line-height: 1.4; letter-spacing: 0.01em; color: var(--color-gray-400); }
    .footer-links { display: flex; gap: var(--space-lg); justify-content: center; margin-top: var(--space-md); }
    .footer-links a { font-size: 13px; color: var(--color-gray-300); text-decoration: none; transition: color 200ms ease; }
    .footer-links a:hover { color: var(--color-accent); }

    /* ============================
       Mobile Nav Overlay
       ============================ */
    .mobile-nav-overlay { position: fixed; inset: 0; z-index: 150; background: rgba(8, 8, 12, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-xl); }
    .mobile-nav-overlay.open { display: flex; }
    .mobile-nav-overlay a { font-family: var(--font-display); font-size: 24px; font-weight: 600; color: var(--color-gray-200); text-decoration: none; transition: color 200ms ease; }
    .mobile-nav-overlay a:hover { color: var(--color-accent); }
    .mobile-nav-close { position: absolute; top: var(--space-xl); right: var(--space-xl); width: 44px; height: 44px; background: transparent; border: none; color: var(--color-gray-200); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ============================
       Shimmer & Progress
       ============================ */
    .img-loading { background: var(--color-bg-card); position: relative; overflow: hidden; }
    .img-loading::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(212, 168, 83, 0.05) 50%, transparent 100%); animation: shimmer 1.5s infinite; }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    .scroll-progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--color-accent); z-index: 101; transition: width 100ms linear; }

    /* ============================
       Responsive
       ============================ */
    @media (max-width: 1023px) { .gallery-grid { column-count: 1; } .nav-links { display: none; } .nav-hamburger { display: flex; } }
    @media (max-width: 639px) {
      .gallery-grid { column-count: 1; }
      .gallery-section { padding-top: calc(48px + var(--space-2xl)); padding-bottom: var(--space-2xl); }
      .top-nav { height: 48px; padding: 0 var(--space-md); }
      .lightbox-arrow.left { left: var(--space-md); } .lightbox-arrow.right { right: var(--space-md); }
      .lightbox-close { top: var(--space-md); right: var(--space-md); }
      .lightbox-toolbar { bottom: var(--space-md); }
      .image-card-img { transition: filter 800ms var(--ease-stellar); }
      .image-card-actions { opacity: 1; }
      .gallery-header { padding: 0 var(--space-md); }
      .image-card-info { padding: 30px var(--space-sm) var(--space-sm); }
    }
  </style>
</head>
<body>

  <div class="scroll-progress" id="scrollProgress" style="width: 0%;"></div>
  <canvas id="particle-canvas"></canvas>

  <!-- Navigation -->
  <nav class="top-nav" id="topNav">
    <div class="nav-logo">Stellar<span style="color:var(--color-accent);">.</span></div>
    <ul class="nav-links">
      <li><a class="active" data-section="gallery">Gallery</a></li>
      <li><a data-section="footer">About</a></li>
    </ul>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu">☰</button>
  </nav>

  <div class="mobile-nav-overlay" id="mobileNav">
    <button class="mobile-nav-close" id="mobileNavClose">✕</button>
    <a data-section="gallery">Gallery</a>
    <a data-section="footer">About</a>
  </div>

  <!-- Gallery -->
  <section class="gallery-section" id="gallery">
    <div class="gallery-header">
      <h2 class="gallery-title">探索星辰</h2>
      <p class="gallery-subtitle">每张图片都是一颗等待唤醒的星辰 — 悬停感受光晕与视差</p>
      <div class="gallery-filters">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="landscape">风景</button>
        <button class="filter-btn" data-filter="urban">城市</button>
        <button class="filter-btn" data-filter="portrait">人像</button>
        <button class="filter-btn" data-filter="nature">自然</button>
      </div>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox-overlay hidden" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">✕</button>
    <button class="lightbox-arrow left" id="lightboxPrev" aria-label="Previous">‹</button>
    <button class="lightbox-arrow right" id="lightboxNext" aria-label="Next">›</button>
    <div class="lightbox-img-container" id="lightboxContainer">
      <img class="lightbox-img" id="lightboxImg" src="" alt="" draggable="false">
    </div>
    <div class="lightbox-zoom-hint" id="lightboxZoomHint">🖱️ 滚轮缩放 · 拖拽平移 · 双击复位</div>
    <div class="lightbox-toolbar">
      <button class="btn-ghost" id="lightboxSave">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>保存
      </button>
      <button class="btn-ghost" id="lightboxShare">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>分享
      </button>
      <button class="btn-ghost" id="lightboxZoomIn" title="放大">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>放大
      </button>
    </div>
  </div>

  <!-- Long Press Menu (Mobile) -->
  <div class="longpress-menu" id="longpressMenu">
    <button id="lpSave">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      保存图片
    </button>

  <script>
    /* ============================
       Image Data
       ============================ */
    const imageData = [
      { id: 1, src: 'images/1782210152459.png', title: '人像作品 01', category: 'portrait', date: '', location: '', isNew: true },
      { id: 2, src: 'images/1782210158805.png', title: '人像作品 02', category: 'portrait', date: '', location: '', isNew: true },
      { id: 3, src: 'images/1782210635533.png', title: '人像作品 03', category: 'portrait', date: '', location: '', isNew: false },
      { id: 4, src: 'images/1782210771450.png', title: '人像作品 04', category: 'portrait', date: '', location: '', isNew: false },
      { id: 5, src: 'images/1782210897284.png', title: '人像作品 05', category: 'portrait', date: '', location: '', isNew: false },
      { id: 6, src: 'images/1782210910862.png', title: '人像作品 06', category: 'portrait', date: '', location: '', isNew: false },
      { id: 7, src: 'images/1782210999263.png', title: '人像作品 07', category: 'portrait', date: '', location: '', isNew: false },
      { id: 8, src: 'images/1782211128132.png', title: '人像作品 08', category: 'portrait', date: '', location: '', isNew: false },
      { id: 9, src: 'images/1782211157173.png', title: '人像作品 09', category: 'portrait', date: '', location: '', isNew: false },
    ];

    /* ============================
       Gallery Rendering
       ============================ */
    const galleryGrid = document.getElementById('galleryGrid');
    let currentFilter = 'all';
    let filteredImages = [...imageData];
    let longpressTargetImg = null; // store image data for long-press menu

    function getCategoryLabel(cat) {
      const labels = { landscape: '风景', urban: '城市', portrait: '人像', nature: '自然' };
      return labels[cat] || cat;
    }

    function renderGallery(filter) {
      currentFilter = filter;
      filteredImages = filter === 'all' ? [...imageData] : imageData.filter(img => img.category === filter);
      galleryGrid.innerHTML = '';

      filteredImages.forEach((img, index) => {
        const card = document.createElement('div');
        card.className = 'image-card';
        card.dataset.index = index;
        card.dataset.id = img.id;

        card.innerHTML = `
          <div class="glow-border"></div>
          <div class="image-card-inner">
            <div class="image-card-actions">
              <button class="card-action-btn save-btn" title="保存" aria-label="Save image">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
              </button>
              <button class="card-action-btn share-btn" title="分享" aria-label="Share image">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              </button>
            </div>
            <img class="image-card-img img-loading" src="${img.src}" alt="${img.title}" loading="lazy">
            <div class="image-card-badge">
              <span class="badge-category">${getCategoryLabel(img.category)}</span>
              ${img.isNew ? '<span class="badge-new">NEW</span>' : ''}
            </div>
            <div class="image-card-info">
              <div class="image-card-title">${img.title}</div>
              <div class="image-card-meta">${img.date && img.location ? img.date + ' · ' + img.location : img.date || img.location || ''}</div>
            </div>
          </div>
        `;

        galleryGrid.appendChild(card);

        // === 3D Tilt Effect on hover ===
        const inner = card.querySelector('.image-card-inner');
        const glow = card.querySelector('.glow-border');

        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;

          // Update glow position
          glow.style.setProperty('--mx', x + '%');
          glow.style.setProperty('--my', y + '%');

          // 3D tilt: -8deg to +8deg range
          const tiltX = ((y - 50) / 50) * -8;
          const tiltY = ((x - 50) / 50) * 8;
          inner.style.transform = `perspective(1200px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        });

        card.addEventListener('mouseleave', () => {
          inner.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg)';
          glow.style.setProperty('--mx', '50%');
          glow.style.setProperty('--my', '50%');
        });

        // Click card → open lightbox
        card.addEventListener('click', (e) => {
          if (e.target.closest('.card-action-btn')) return;
          openLightbox(index);
        });

        card.querySelector('.save-btn').addEventListener('click', (e) => { e.stopPropagation(); saveImage(img); });
        card.querySelector('.share-btn').addEventListener('click', (e) => { e.stopPropagation(); shareImage(img); });

        const imgEl = card.querySelector('.image-card-img');
        imgEl.addEventListener('load', () => { imgEl.classList.remove('img-loading'); });

        // === Long Press on mobile ===
        let longPressTimer;
        card.addEventListener('touchstart', (e) => {
          if (e.target.closest('.card-action-btn')) return;
          longpressTargetImg = img;
          longPressTimer = setTimeout(() => {
            showLongpressMenu(e.touches[0].clientX, e.touches[0].clientY);
            navigator.vibrate && navigator.vibrate(15);
          }, 600);
        }, { passive: true });
        card.addEventListener('touchend', () => { clearTimeout(longPressTimer); });
        card.addEventListener('touchmove', () => { clearTimeout(longPressTimer); });
      });

      observeCards();
    }

    /* ============================
       IntersectionObserver — Awakening
       ============================ */
    let observer;
    function observeCards() {
      if (observer) observer.disconnect();
      observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            requestAnimationFrame(() => {
              entry.target.classList.add('awakened');
            });
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.3 });
      document.querySelectorAll('.image-card').forEach(card => observer.observe(card));
    }

    /* ============================
       Filter Buttons
       ============================ */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGallery(btn.dataset.filter);
      });
    });

    /* ============================
       Long Press Context Menu
       ============================ */
    const longpressMenu = document.getElementById('longpressMenu');

    function showLongpressMenu(x, y) {
      const menuW = 170; const menuH = 180;
      let left = x - menuW / 2;
      let top = y - menuH - 10;
      if (left < 10) left = 10;
      if (left + menuW > window.innerWidth - 10) left = window.innerWidth - menuW - 10;
      if (top < 10) top = y + 20;
      longpressMenu.style.left = left + 'px';
      longpressMenu.style.top = top + 'px';
      longpressMenu.classList.add('show');
    }

    function hideLongpressMenu() { longpressMenu.classList.remove('show'); }

    document.getElementById('lpSave').addEventListener('click', () => {
      if (longpressTargetImg) saveImage(longpressTargetImg);
      hideLongpressMenu();
    });
    document.getElementById('lpShare').addEventListener('click', () => {
      if (longpressTargetImg) shareImage(longpressTargetImg);
      hideLongpressMenu();
    });
    document.getElementById('lpView').addEventListener('click', () => {
      if (longpressTargetImg) {
        const idx = filteredImages.findIndex(i => i.id === longpressTargetImg.id);
        if (idx >= 0) openLightbox(idx);
      }
      hideLongpressMenu();
    });

    document.addEventListener('click', (e) => {
      if (!longpressMenu.contains(e.target)) hideLongpressMenu();
    });
    document.addEventListener('scroll', hideLongpressMenu);

    /* ============================
       Enhanced Particle System
       ============================ */
    const pCanvas = document.getElementById('particle-canvas');
    const pCtx = pCanvas.getContext('2d');
    let particles = [];
    let mouseX = -1000, mouseY = -1000;
    let particleCount = 80;
    let pConnectionDist = 150;

    function resizeCanvas() {
      pCanvas.width = window.innerWidth;
      pCanvas.height = window.innerHeight;
      pCanvas.style.width = window.innerWidth + 'px';
      pCanvas.style.height = window.innerHeight + 'px';
      adjustParticleCount();
    }

    function adjustParticleCount() {
      const w = window.innerWidth;
      if (w <= 639) { particleCount = 45; pConnectionDist = 120; }
      else if (w <= 1023) { particleCount = 65; pConnectionDist = 150; }
      else { particleCount = 80; pConnectionDist = 150; }
    }

    function initParticles() {
      const w = pCanvas.width;
      const h = pCanvas.height;
      particles = [];
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.6,
          vy: (Math.random() - 0.5) * 0.6,
          radius: 2 + Math.random() * 3,
          baseOpacity: 0.35 + Math.random() * 0.4,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: 0.008 + Math.random() * 0.02,
        });
      }
    }

    function drawParticles() {
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

      const mx = mouseX;
      const my = mouseY;
      const w = pCanvas.width;
      const h = pCanvas.height;

      const INFLUENCE_RADIUS = 200;
      const INFLUENCE_STRENGTH = 0.04;

      // Update & draw
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        // Mouse attraction — only when mouse is on screen
        const dx = mx - p.x;
        const dy = my - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < INFLUENCE_RADIUS) {
          const force = (1 - dist / INFLUENCE_RADIUS) * INFLUENCE_STRENGTH;
          p.x += dx * force;
          p.y += dy * force;
        }

        // Slow drift
        p.x += p.vx;
        p.y += p.vy;

        // Wrap around edges
        if (p.x < -30) p.x = w + 30;
        if (p.x > w + 30) p.x = -30;
        if (p.y < -30) p.y = h + 30;
        if (p.y > h + 30) p.y = -30;

        // Pulsing opacity
        p.pulse += p.pulseSpeed;
        const pulseOpacity = p.baseOpacity + Math.sin(p.pulse) * 0.1;

        // Draw glow circle
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.radius * 2.5, 0, Math.PI * 2);
        const glowGrad = pCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2.5);
        glowGrad.addColorStop(0, `rgba(255, 255, 255, ${pulseOpacity})`);
        glowGrad.addColorStop(0.4, `rgba(255, 255, 255, ${pulseOpacity * 0.4})`);
        glowGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        pCtx.fillStyle = glowGrad;
        pCtx.fill();

        // Draw bright core
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.radius * 0.6, 0, Math.PI * 2);
        pCtx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, pulseOpacity * 1.5)})`;
        pCtx.fill();
      }

      // Draw connections between nearby particles
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < pConnectionDist) {
            const alpha = (1 - dist / pConnectionDist) * 0.15;
            pCtx.beginPath();
            pCtx.moveTo(particles[i].x, particles[i].y);
            pCtx.lineTo(particles[j].x, particles[j].y);
            pCtx.strokeStyle = `rgba(212, 168, 83, ${alpha})`;
            pCtx.lineWidth = 0.8;
            pCtx.stroke();
          }
        }
      }

      requestAnimationFrame(drawParticles);
    }

    resizeCanvas();
    initParticles();
    drawParticles();

    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
    window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

    // Touch support for particles
    window.addEventListener('touchmove', (e) => {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchstart', (e) => {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchend', () => { mouseX = -1000; mouseY = -1000; });

    /* ============================
       Lightbox with Zoom & Drag
       ============================ */
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxContainer = document.getElementById('lightboxContainer');
    const lightboxZoomHint = document.getElementById('lightboxZoomHint');
    let currentLightboxIndex = -1;
    let scale = 1, panX = 0, panY = 0;
    let isDragging = false, dragStartX = 0, dragStartY = 0;
    let panStartX = 0, panStartY = 0;
    let imageNaturalW = 0, imageNaturalH = 0;

    // Reset zoom state
    function resetZoom() {
      scale = 1; panX = 0; panY = 0;
      lightboxImg.style.transform = 'scale(1)';
      lightboxContainer.classList.remove('zoomed');
      lightboxZoomHint.classList.remove('show');
    }

    function applyTransform() {
      lightboxImg.style.transform = `scale(${scale}) translate(${panX / scale}px, ${panY / scale}px)`;
    }

    function clampPan() {
      if (scale <= 1) { panX = 0; panY = 0; return; }
      const maxPan = (scale - 1) * 100;
      panX = Math.max(-maxPan, Math.min(maxPan, panX));
      panY = Math.max(-maxPan, Math.min(maxPan, panY));
    }

    function openLightbox(index) {
      currentLightboxIndex = index;
      const img = filteredImages[index];
      lightboxImg.src = img.src;
      lightbox.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      resetZoom();
      if (index + 1 < filteredImages.length) new Image().src = filteredImages[index + 1].src;
      if (index - 1 >= 0) new Image().src = filteredImages[index - 1].src;

      // Show zoom hint after a moment
      setTimeout(() => { lightboxZoomHint.classList.add('show'); }, 500);
      setTimeout(() => { lightboxZoomHint.classList.remove('show'); }, 4000);
    }

    function closeLightbox() {
      lightbox.classList.add('hidden');
      document.body.style.overflow = '';
      currentLightboxIndex = -1;
      resetZoom();
    }

    function navigateLightbox(dir) {
      if (currentLightboxIndex < 0) return;
      let newIndex = currentLightboxIndex + dir;
      if (newIndex < 0) newIndex = filteredImages.length - 1;
      if (newIndex >= filteredImages.length) newIndex = 0;
      resetZoom();
      lightboxImg.style.opacity = '0';
      setTimeout(() => {
        currentLightboxIndex = newIndex;
        const img = filteredImages[newIndex];
        lightboxImg.src = img.src;
        lightboxImg.style.opacity = '1';
        if (newIndex + 1 < filteredImages.length) new Image().src = filteredImages[newIndex + 1].src;
        if (newIndex - 1 >= 0) new Image().src = filteredImages[newIndex - 1].src;
        setTimeout(() => { lightboxZoomHint.classList.add('show'); }, 500);
        setTimeout(() => { lightboxZoomHint.classList.remove('show'); }, 3500);
      }, 150);
    }

    // Close / Nav
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', () => navigateLightbox(-1));
    document.getElementById('lightboxNext').addEventListener('click', () => navigateLightbox(1));

    document.addEventListener('keydown', (e) => {
      if (currentLightboxIndex < 0) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Zoom button
    document.getElementById('lightboxZoomIn').addEventListener('click', () => {
      if (scale >= 1) {
        scale = Math.min(scale * 1.5, 4);
        lightboxContainer.classList.add('zoomed');
        lightboxZoomHint.classList.remove('show');
      } else {
        scale = 1; panX = 0; panY = 0;
        lightboxContainer.classList.remove('zoomed');
      }
      applyTransform();
    });

    // Mouse wheel zoom
    lightbox.addEventListener('wheel', (e) => {
      if (currentLightboxIndex < 0) return;
      e.preventDefault();
      lightboxZoomHint.classList.remove('show');
      const oldScale = scale;
      scale += e.deltaY * -0.01;
      scale = Math.max(0.5, Math.min(4, scale));

      // Adjust pan to zoom towards cursor
      if (scale > 1 || oldScale > 1) {
        const rect = lightboxContainer.getBoundingClientRect();
        const cx = e.clientX - rect.left - rect.width / 2;
        const cy = e.clientY - rect.top - rect.height / 2;
        panX += cx * (scale / oldScale - 1);
        panY += cy * (scale / oldScale - 1);
      }

      if (scale <= 1) { panX = 0; panY = 0; lightboxContainer.classList.remove('zoomed'); }
      else { lightboxContainer.classList.add('zoomed'); }
      clampPan();
      applyTransform();
    }, { passive: false });

    // Double-click to reset zoom
    lightboxImg.addEventListener('dblclick', (e) => {
      e.preventDefault();
      if (scale > 1.1) { resetZoom(); applyTransform(); }
      else { scale = 2; lightboxContainer.classList.add('zoomed'); lightboxZoomHint.classList.remove('show'); applyTransform(); }
    });

    // Drag to pan
    lightboxContainer.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      lightboxContainer.classList.add('dragging');
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      panStartX = panX;
      panStartY = panY;
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      panX = panStartX + (e.clientX - dragStartX);
      panY = panStartY + (e.clientY - dragStartY);
      clampPan();
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        lightboxContainer.classList.remove('dragging');
      }
    });

    // Touch drag for panning
    let touchDist0 = 0;
    let touchScaleStart = 1, touchPanStartX = 0, touchPanStartY = 0;
    let touchMidX = 0, touchMidY = 0;
    let singleTouch = false;

    lightboxContainer.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        singleTouch = true;
        isDragging = true;
        lightboxContainer.classList.add('dragging');
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        panStartX = panX;
        panStartY = panY;
      } else if (e.touches.length === 2) {
        singleTouch = false;
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        touchDist0 = Math.sqrt(dx * dx + dy * dy);
        touchScaleStart = scale;
        touchPanStartX = panX;
        touchPanStartY = panY;
        touchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        touchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

        const rect = lightboxContainer.getBoundingClientRect();
        touchMidX = touchMidX - rect.left - rect.width / 2;
        touchMidY = touchMidY - rect.top - rect.height / 2;
      }
    }, { passive: false });

    lightboxContainer.addEventListener('touchmove', (e) => {
      e.preventDefault();
      lightboxZoomHint.classList.remove('show');
      if (e.touches.length === 1 && singleTouch) {
        panX = panStartX + (e.touches[0].clientX - dragStartX);
        panY = panStartY + (e.touches[0].clientY - dragStartY);
        clampPan();
        applyTransform();
      } else if (e.touches.length === 2) {
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (touchDist0 > 0) {
          scale = touchScaleStart * (dist / touchDist0);
          scale = Math.max(1, Math.min(4, scale));
          panX = touchPanStartX + touchMidX * (scale / touchScaleStart - 1);
          panY = touchPanStartY + touchMidY * (scale / touchScaleStart - 1);
          clampPan();
          applyTransform();
          if (scale > 1) lightboxContainer.classList.add('zoomed');
          else { lightboxContainer.classList.remove('zoomed'); panX = 0; panY = 0; }
        }
      }
    }, { passive: false });

    lightboxContainer.addEventListener('touchend', () => {
      if (isDragging) {
        isDragging = false;
        lightboxContainer.classList.remove('dragging');
      }
      if (scale <= 1) { panX = 0; panY = 0; lightboxContainer.classList.remove('zoomed'); applyTransform(); }
    });

    // Swipe left/right for navigation (when not zoomed)
    let touchStartLX = 0;
    lightbox.addEventListener('touchstart', (e) => {
      if (scale <= 1) touchStartLX = e.touches[0].clientX;
    }, { passive: true });

    lightbox.addEventListener('touchend', (e) => {
      if (scale > 1.1) return;
      const diff = touchStartLX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 60) navigateLightbox(diff > 0 ? 1 : -1);
    }, { passive: true });

    // Save/Share in lightbox
    document.getElementById('lightboxSave').addEventListener('click', () => {
      if (currentLightboxIndex >= 0) saveImage(filteredImages[currentLightboxIndex]);
    });
    document.getElementById('lightboxShare').addEventListener('click', () => {
      if (currentLightboxIndex >= 0) shareImage(filteredImages[currentLightboxIndex]);
    });

    /* ============================
       Save & Share
       ============================ */
    function saveImage(img) {
      const link = document.createElement('a');
      link.href = img.src;
      link.download = `${img.title}.jpg`;
      link.target = '_blank';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('图片已保存');
    }

    function shareImage(img) {
      if (navigator.share) {
        navigator.share({ title: img.title, text: `${img.title} — Stellar Gallery`, url: img.src })
          .catch(() => { fallbackCopy(img.src); });
      } else { fallbackCopy(img.src); }
    }

    function fallbackCopy(url) {
      navigator.clipboard.writeText(url).then(() => { showToast('链接已复制到剪贴板'); })
        .catch(() => { showToast('请手动复制链接'); });
    }

    /* ============================
       Toast
       ============================ */
    function showToast(message) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<span class="toast-icon">✓</span> ${message}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0'; toast.style.transform = 'translateY(10px)';
        toast.style.transition = 'all 300ms ease';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    /* ============================
       Navigation Links
       ============================ */
    document.querySelectorAll('[data-section]').forEach(link => {
      link.addEventListener('click', () => {
        const section = document.getElementById(link.dataset.section);
        if (section) section.scrollIntoView({ behavior: 'smooth' });
        document.getElementById('mobileNav').classList.remove('open');
        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
        document.querySelectorAll('.nav-links a').forEach(a => {
          if (a.dataset.section === link.dataset.section) a.classList.add('active');
        });
      });
    });

    /* ============================
       Mobile Nav
       ============================ */
    document.getElementById('navHamburger').addEventListener('click', () => { document.getElementById('mobileNav').classList.add('open'); });
    document.getElementById('mobileNavClose').addEventListener('click', () => { document.getElementById('mobileNav').classList.remove('open'); });
    document.querySelectorAll('#mobileNav a').forEach(link => {
      link.addEventListener('click', () => {
        const section = document.getElementById(link.dataset.section);
        if (section) section.scrollIntoView({ behavior: 'smooth' });
        document.getElementById('mobileNav').classList.remove('open');
      });
    });

    /* ============================
       Scroll Progress
       ============================ */
    window.addEventListener('scroll', () => {
      const pct = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
      document.getElementById('scrollProgress').style.width = pct + '%';
    });

    /* ============================
       Init
       ============================ */
    renderGallery('all');
  </script>
</body>
</html>
