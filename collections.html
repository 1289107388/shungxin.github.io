<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图集 | 双薪写真画廊</title>
  <meta name="description" content="浏览双薪写真画廊的精选图片合集">
  <link rel="stylesheet" href="css/styles.css?v=3">
  <link rel="stylesheet" href="css/aos.css">
</head>
<body>

  <div class="scroll-progress" id="scrollProgress" style="width: 0%;"></div>
  <canvas id="particle-canvas"></canvas>

  <!-- Navigation -->
  <nav class="top-nav" id="topNav">
    <a href="index.html" class="nav-logo">双薪写真<span style="color:var(--color-accent);">.</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Gallery</a></li>
      <li><a href="creators.html">Creators</a></li>
      <li><a class="active" href="collections.html">图集</a></li>
      <li><a href="paid.html">免费区</a></li>
      <li><a href="index.html#footer">About</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:8px;">
      <div id="authArea" class="auth-area" data-state="logged-out">
        <button class="auth-btn" id="authLoginBtn" type="button">登录</button>
        <button class="auth-btn auth-btn-primary" id="authRegisterBtn" type="button">注册</button>
      </div>
      <div id="userMenu" class="user-menu" hidden>
        <button class="user-menu-trigger" id="userMenuTrigger" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="user-avatar" id="userAvatar">U</span>
          <span class="user-name" id="userName">用户</span>
          <span class="user-caret">▾</span>
        </button>
        <div class="user-menu-dropdown" id="userMenuDropdown" hidden>
          <div class="user-menu-header">
            <span class="user-name" id="userMenuName">用户</span>
            <span class="user-role" id="userMenuRole">user</span>
          </div>
          <button type="button" class="user-menu-item" id="userMenuUpload">📷 上传作品</button>
          <button type="button" class="user-menu-item" id="userMenuProfile">个人资料</button>
          <button type="button" class="user-menu-item" id="userMenuChangePwd">修改密码</button>
          <button type="button" class="user-menu-item user-menu-item-danger" id="userMenuLogout">退出登录</button>
        </div>
      </div>

      <button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="切换深色/浅色主题">
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="nav-hamburger" id="navHamburger" aria-label="Menu">☰</button>
    </div>
  </nav>

  <div class="mobile-nav-overlay" id="mobileNav">
    <button class="mobile-nav-close" id="mobileNavClose">✕</button>
    <a href="index.html">Gallery</a>
    <a href="creators.html">Creators</a>
    <a class="active" href="collections.html">图集</a>
    <a href="paid.html">免费区</a>
    <a href="index.html#footer">About</a>
  </div>

  <!-- Collections List -->
  <section class="gallery-section" id="collections">
    <div class="gallery-header" data-aos="fade-down">
      <h2 class="gallery-title" data-aos="fade-up" data-aos-delay="100">精选图集</h2>
      <p class="gallery-subtitle" data-aos="fade-up" data-aos-delay="200">按主题浏览更多精彩作品</p>
    </div>
    <div id="collectionsContainer"></div>
  </section>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <footer class="site-footer" id="footer">
    <a href="index.html" class="footer-logo">双薪写真<span style="color:var(--color-accent);">.</span></a>
    <p class="footer-text">Crafted with light and silence — a gallery among the stars</p>
    <div class="footer-links"><a href="#">Privacy</a><a href="#">Terms</a><a href="#">Contact</a></div>
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/eventBus.js"></script>
  <script src="js/collections.js?v=3"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { if (window.Collections) Collections.renderList('collectionsContainer', 'public'); });</script>
  <script src="js/nav.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/userProfile.js"></script>
  <script src="js/upload.js"></script>

  <script src="js/aos.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.AOS) {
        AOS.init({ duration: 700, easing: 'ease-out-cubic', once: true, offset: 80, disable: window.matchMedia('(prefers-reduced-motion: reduce)').matches });
      }
    });
  </script>

</body>
</html>
